# Dependabot version-update PRs for GitHub Actions workflows.
# No package-manager manifest is present, so this intentionally avoids noisy
# unsupported ecosystems.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
