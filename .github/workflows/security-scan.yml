# Additive secret scanning gate. GitHub secret scanning + push protection are
# enabled at the repo level; this workflow gives every repo a visible CI check
# using only GitHub-owned actions plus a pinned, checksum-verified binary.
name: security-scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "23 6 * * 1" # weekly, Monday 06:23 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks (pinned binary)
        run: |
          VERSION=8.30.1
          SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -sSfL -o gitleaks.tar.gz             "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          echo "${SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          rm -f gitleaks.tar.gz gitleaks
      - name: Scan full git history for secrets
        run: gitleaks git --redact --verbose .
